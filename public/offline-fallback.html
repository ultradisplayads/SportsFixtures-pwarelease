<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You are offline — Sports Fixtures</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #0a1408;
      color: #e8f5e2;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
    }
    .card {
      max-width: 360px;
      background: #111d0f;
      border: 1px solid #1e3a1a;
      border-radius: 1rem;
      padding: 2rem 1.5rem;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
      opacity: 0.6;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #d4f0c8;
    }
    p {
      font-size: 0.875rem;
      line-height: 1.6;
      color: #8aab82;
      margin-bottom: 1.5rem;
    }
    button {
      background: #2d6a27;
      color: #e8f5e2;
      border: none;
      border-radius: 0.75rem;
      padding: 0.625rem 1.5rem;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:active { opacity: 0.8; }
  </style>
</head>
<body>
  <div class="card">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#4a8a42" stroke-width="1.5"
         stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01" />
    </svg>
    <h1>You are offline</h1>
    <p>
      Check your connection and try again. Cached fixtures and recently
      visited pages are still available.
    </p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
